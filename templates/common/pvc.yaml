kind: PersistentVolumeClaim
apiVersion: v1
metadata:
    {{- if .group }}
    name: pvc-{{ .group }}-{{ .Replica }}
    {{- else }}
    name: pvc-{{ .Replica }}
    {{- end }}
spec:
    accessModes:
        - ReadWriteOnce
    volumeMode: Filesystem
    resources:
        requests:
            storage: {{ or .size "100Mi" }}
    storageClassName: {{ or .storage_class  "general"}}
